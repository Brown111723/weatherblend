<!-- @dsCard group="Components" viewport="700x230" name="Data display" subtitle="Metric cards, model badges, weights & confidence" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0;background:var(--wb-bg);color:var(--wb-text);font-family:var(--wb-font-sans);}
  #root{padding:22px;display:flex;flex-direction:column;gap:16px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .lbl{font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--wb-text-dim);margin-bottom:6px;}
  a{color:var(--wb-accent);} a:hover{color:var(--wb-accent-press);}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { MetricCard, ModelBadge, WeightBadge, ConfidenceTag } = window.WeatherBlendDesignSystem_0cb5aa;
  function Demo(){
    return (
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        <div className="grid">
          <MetricCard metric="temp"  title="Temp"  value="24°"    subs={["Feels 22°","↑ 26°  ↓ 14°"]} confidence={82}/>
          <MetricCard metric="rain"  title="Rain"  value="0.4 mm" subs={["Day total","Expected today"]}/>
          <MetricCard metric="wind"  title="Wind"  value="22 km/h" subs={["↗ NE","↑ 30  ↓ 8 km/h"]}/>
          <MetricCard metric="cloud" title="Cloud" value="60%"    subs={["↑ 90%  ↓ 20%","Broken cloud"]}/>
        </div>
        <div className="row" style={{gap:34}}>
          <div>
            <div className="lbl">Model badges + weights</div>
            <div className="row" style={{gap:12}}>
              <ModelBadge model="gfs" weight={0.22}/>
              <ModelBadge model="ecmwf" weight={0.28}/>
              <ModelBadge model="icon" weight={0.15}/>
              <ModelBadge model="ukmo" weight={0.08}/>
            </div>
          </div>
          <div>
            <div className="lbl">Confidence</div>
            <div className="row" style={{gap:14}}>
              <ConfidenceTag value={88}/><ConfidenceTag value={52}/><ConfidenceTag value={22}/>
              <WeightBadge weight={0.31}/>
            </div>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
