<!-- @dsCard group="Components" viewport="700x260" name="Weather glyphs" subtitle="Condition icons, metric icons, the data orb & day-trace sparkline" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0;background:var(--wb-bg);color:var(--wb-text);font-family:var(--wb-font-sans);}
  #root{padding:22px;display:flex;flex-direction:column;gap:18px;}
  .row{display:flex;align-items:center;gap:22px;flex-wrap:wrap;}
  .lbl{font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--wb-text-dim);margin-bottom:6px;}
  .stack{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;color:var(--wb-text-muted);}
  a{color:var(--wb-accent);} a:hover{color:var(--wb-accent-press);}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { WeatherIcon, MetricIcon, WeatherOrb, Sparkline } = window.WeatherBlendDesignSystem_0cb5aa;
  const codes=[[0,'Clear'],[2,'Partly'],[3,'Cloud'],[45,'Fog'],[61,'Rain'],[71,'Snow'],[95,'Storm']];
  const temps=[12,11,11,13,17,21,24,26,25,22,18,15];
  function Demo(){
    return (
      <div style={{display:'flex',flexDirection:'column',gap:18}}>
        <div>
          <div className="lbl">Condition icons (by weather code)</div>
          <div className="row" style={{gap:16}}>
            {codes.map(([c,n])=>(<div className="stack" key={c}><WeatherIcon code={c} size={34}/><span>{n}</span></div>))}
          </div>
        </div>
        <div className="row" style={{gap:40}}>
          <div>
            <div className="lbl">Metric icons</div>
            <div className="row" style={{gap:14}}>
              <MetricIcon metric="temp" size={22}/><MetricIcon metric="rain" size={22}/><MetricIcon metric="wind" size={22}/><MetricIcon metric="cloud" size={22}/>
            </div>
          </div>
          <div>
            <div className="lbl">Data orb (the fingerprint)</div>
            <div className="row" style={{gap:18}}>
              <WeatherOrb temp={26} rain={0.1} wind={14} cloud={30} size={56}/>
              <WeatherOrb temp={9} rain={3.2} wind={38} cloud={92} size={56}/>
              <WeatherOrb temp={19} rain={0.6} wind={22} cloud={60} size={56}/>
            </div>
          </div>
        </div>
        <div>
          <div className="lbl">Day-trace sparkline (solid observed · dashed forecast)</div>
          <div style={{maxWidth:360}}>
            <Sparkline values={temps} metric="temp" split={0.5} ticks={[{frac:0.25},{frac:0.8}]} height={44}/>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
