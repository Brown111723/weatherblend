<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Card Background Tester</title>
  <style>
    :root {
      --bg-top: #0b1020;
      --bg-bottom: #121a34;
      --card: rgba(18, 25, 46, 0.68);
      --card-border: rgba(255,255,255,0.10);
      --text: #ecf2ff;
      --muted: rgba(236, 242, 255, 0.72);
      --accent: #6fd3ff;
      --drop: rgba(130, 205, 255, 0.85);
      --cloud: rgba(255, 255, 255, 0.18);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      overflow: hidden;
      background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    .screen {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      isolation: isolate;
      background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      transition: background 0.7s ease, filter 0.7s ease;
    }

    .backdrop {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .glow {
      position: absolute;
      inset: auto auto 18% 50%;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(110, 190, 255, 0.18), transparent 62%);
      transform: translateX(-50%);
      filter: blur(6px);
      opacity: 0.55;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .moon, .sun {
      position: absolute;
      top: 10%;
      right: 12%;
      width: 84px;
      height: 84px;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .sun {
      background: radial-gradient(circle at 35% 35%, #fff6b6, #ffd56a 58%, rgba(255, 213, 106, 0.1) 75%);
      box-shadow: 0 0 60px 24px rgba(255, 208, 92, 0.22);
      transform: scale(0.92);
    }

    .moon {
      background: radial-gradient(circle at 35% 35%, #f7f7fb, #dfe7ff 55%, rgba(223, 231, 255, 0.08) 76%);
      box-shadow: 0 0 48px 18px rgba(220, 232, 255, 0.10);
      transform: scale(0.92);
    }

    .moon::after {
      content: "";
      position: absolute;
      inset: 0 0 0 18px;
      border-radius: 50%;
      background: rgba(9, 15, 30, 0.92);
    }

    .cloud {
      position: absolute;
      background: var(--cloud);
      border-radius: 999px;
      opacity: 0;
      filter: blur(0.2px);
      transition: opacity 0.55s ease, transform 0.55s ease;
      backdrop-filter: blur(8px);
    }

    .cloud::before, .cloud::after {
      content: "";
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }

    .cloud.c1 { width: 150px; height: 46px; top: 14%; left: 10%; }
    .cloud.c1::before { width: 56px; height: 56px; left: 18px; top: -28px; }
    .cloud.c1::after { width: 76px; height: 76px; left: 62px; top: -34px; }

    .cloud.c2 { width: 210px; height: 62px; top: 24%; right: 14%; transform: scale(1.05); }
    .cloud.c2::before { width: 74px; height: 74px; left: 28px; top: -36px; }
    .cloud.c2::after { width: 98px; height: 98px; left: 92px; top: -48px; }

    .cloud.c3 { width: 130px; height: 40px; top: 44%; left: 22%; transform: scale(0.88); }
    .cloud.c3::before { width: 48px; height: 48px; left: 16px; top: -24px; }
    .cloud.c3::after { width: 64px; height: 64px; left: 54px; top: -30px; }

    .rain {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.35s ease;
      overflow: hidden;
      mix-blend-mode: screen;
    }

    .drop, .streak {
      position: absolute;
      background: linear-gradient(180deg, rgba(200,235,255,0), var(--drop));
    }

    .drop {
      width: 8px;
      height: 18px;
      border-radius: 50% 50% 60% 60%;
      box-shadow: 0 0 10px rgba(130,205,255,0.18);
      animation: fall linear infinite;
    }

    .streak {
      width: 2px;
      height: 48px;
      opacity: 0.55;
      border-radius: 999px;
      animation: fall linear infinite;
    }

    .splash {
      position: absolute;
      width: 18px;
      height: 6px;
      border-radius: 50%;
      border: 1.5px solid rgba(130,205,255,0.55);
      border-top-color: transparent;
      border-left-color: transparent;
      border-right-color: transparent;
      opacity: 0;
      animation: splash 2.8s linear infinite;
    }

    @keyframes fall {
      from { transform: translateY(-12vh) translateX(0) scale(1); }
      to { transform: translateY(110vh) translateX(18px) scale(0.95); }
    }

    @keyframes splash {
      0%, 82% { opacity: 0; transform: translateY(0) scaleX(0.4); }
      83% { opacity: 0.75; transform: translateY(0) scaleX(1); }
      100% { opacity: 0; transform: translateY(0) scaleX(1.2); }
    }

    .wind-lines {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.4s ease;
      background-image:
        linear-gradient(90deg, transparent 0 18%, rgba(255,255,255,0.12) 18% 19%, transparent 19% 100%),
        linear-gradient(90deg, transparent 0 36%, rgba(255,255,255,0.08) 36% 37%, transparent 37% 100%);
      background-size: 320px 120px, 360px 170px;
      background-position: -120px 18%, -200px 62%;
      background-repeat: repeat-x;
      animation: windMove 5s linear infinite;
    }

    @keyframes windMove {
      from { transform: translateX(-30px); }
      to { transform: translateX(150px); }
    }

    .card-wrap {
      position: relative;
      z-index: 2;
      width: min(92vw, 460px);
    }

    .card {
      position: relative;
      border-radius: 26px;
      padding: 24px 22px 20px;
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: 0 24px 60px rgba(0,0,0,0.30);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, rgba(255,255,255,0.12), transparent 24%, transparent 78%, rgba(255,255,255,0.05));
      pointer-events: none;
    }

    .toprow {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .location {
      font-size: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(236,242,255,0.68);
    }

    .time {
      margin-top: 6px;
      font-size: 18px;
      font-weight: 600;
    }

    .icon-wrap {
      width: 94px;
      height: 94px;
      position: relative;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
    }

    .icon {
      width: 86px;
      height: 86px;
      opacity: 0.86;
      filter: drop-shadow(0 0 18px rgba(120, 200, 255, 0.18));
    }

    .icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .icon .stroke { stroke: rgba(240,248,255,0.92); }
    .icon .fill { fill: rgba(240,248,255,0.10); }
    .icon .accent { fill: rgba(255,255,255,0.72); }

    .temp {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-top: 2px;
    }

    .temp .value {
      font-size: 58px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .temp .unit {
      font-size: 26px;
      font-weight: 600;
      color: rgba(236,242,255,0.85);
    }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .meta {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .pill {
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(236,242,255,0.84);
      font-size: 13px;
    }

    .controls {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 3;
      width: min(92vw, 460px);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .control {
      background: rgba(18, 25, 46, 0.66);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 10px 12px;
      backdrop-filter: blur(10px);
    }

    .control h3 {
      margin: 0 0 8px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(236,242,255,0.58);
    }

    label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 4px 10px 4px 0;
      cursor: pointer;
      font-size: 13px;
      color: rgba(236,242,255,0.84);
      user-select: none;
    }

    input[type="radio"] { accent-color: #77d6ff; }

    .day { --bg-top: #111a31; --bg-bottom: #1b2a47; }
    .sunset { --bg-top: #201530; --bg-bottom: #4d2a44; }
    .night { --bg-top: #070c18; --bg-bottom: #111d33; }
    .hot { --bg-top: #2a1930; --bg-bottom: #5c3048; }
    .mild { --bg-top: #0b1020; --bg-bottom: #121a34; }
    .cool { --bg-top: #081423; --bg-bottom: #17304f; }
    .cold { --bg-top: #09131f; --bg-bottom: #1a2a39; }
    .rainy { --card: rgba(15, 20, 38, 0.72); }
    .overcast { filter: brightness(0.88) saturate(0.92); }
    .day .sun, .sunset .sun { opacity: 1; }
    .night .moon { opacity: 1; }
    .night .glow { opacity: 0.22; }
    .cloudy .cloud, .overcast .cloud { opacity: 1; }
    .rainy .rain { opacity: 1; }
    .windy .wind-lines { opacity: 1; }

    @media (max-width: 760px) {
      .controls { grid-template-columns: 1fr; left: 50%; transform: translateX(-50%); bottom: 14px; }
      .card-wrap { width: min(92vw, 420px); }
      .temp .value { font-size: 52px; }
      .icon-wrap { width: 86px; height: 86px; }
      .icon { width: 78px; height: 78px; }
    }
  </style>
</head>
<body>
  <div id="screen" class="screen day mild">
    <div class="backdrop">
      <div class="glow"></div>
      <div class="sun"></div>
      <div class="moon"></div>
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="cloud c3"></div>
      <div class="wind-lines"></div>
      <div id="rain" class="rain"></div>
    </div>

    <div class="card-wrap">
      <div class="card">
        <div class="toprow">
          <div>
            <div class="location">WeatherBlend Preview</div>
            <div id="statusTime" class="time">Monday 29 June</div>
          </div>
          <div class="icon-wrap">
            <div class="icon" id="iconBox">
              <svg viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <g id="iconSun">
                  <circle cx="48" cy="48" r="18" class="fill" />
                  <circle cx="48" cy="48" r="13" class="accent" opacity="0.8" />
                </g>
                <g id="iconCloud">
                  <path class="stroke" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" d="M29 59h34a11 11 0 0 0 0-22c-2.7 0-5.2.9-7.2 2.4A18 18 0 0 0 21 45.8 9.7 9.7 0 0 0 29 59Z" />
                </g>
                <g id="iconRain">
                  <path class="stroke" stroke-width="2.8" stroke-linecap="round" d="M35 66v6M47 66v8M59 66v6" />
                </g>
                <g id="iconMoon">
                  <path class="stroke" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" d="M56 27c-6.2 1.4-10.8 7-10.8 13.5 0 7.8 6.3 14.1 14.1 14.1 4.4 0 8.4-2 11-5.2A21 21 0 1 1 56 27Z" opacity="0.9" />
                </g>
              </svg>
            </div>
          </div>
        </div>

        <div class="temp">
          <div id="tempValue" class="value">11.9</div>
          <div class="unit">°</div>
        </div>
        <div id="subtitle" class="subtitle">Feels like 7.5°</div>

        <div class="meta">
          <div id="meta1" class="pill">Clear</div>
          <div id="meta2" class="pill">Calm wind</div>
          <div id="meta3" class="pill">Low cloud</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="control">
        <h3>Time</h3>
        <label><input type="radio" name="time" value="day" checked> Day</label>
        <label><input type="radio" name="time" value="sunset"> Sunset</label>
        <label><input type="radio" name="time" value="night"> Night</label>
      </div>
      <div class="control">
        <h3>Temperature</h3>
        <label><input type="radio" name="temp" value="hot"> Hot</label>
        <label><input type="radio" name="temp" value="mild" checked> Mild</label>
        <label><input type="radio" name="temp" value="cool"> Cool</label>
        <label><input type="radio" name="temp" value="cold"> Cold</label>
      </div>
      <div class="control">
        <h3>Rain</h3>
        <label><input type="radio" name="rain" value="clear" checked> Clear</label>
        <label><input type="radio" name="rain" value="rainy"> Rain</label>
      </div>
      <div class="control">
        <h3>Cloud</h3>
        <label><input type="radio" name="cloud" value="clear" checked> Clear</label>
        <label><input type="radio" name="cloud" value="cloudy"> Cloudy</label>
        <label><input type="radio" name="cloud" value="overcast"> Overcast</label>
      </div>
      <div class="control">
        <h3>Wind</h3>
        <label><input type="radio" name="wind" value="calm" checked> Calm</label>
        <label><input type="radio" name="wind" value="windy"> Windy</label>
      </div>
    </div>
  </div>

  <script>
    const screen = document.getElementById('screen');
    const rainHost = document.getElementById('rain');
    const tempValue = document.getElementById('tempValue');
    const subtitle = document.getElementById('subtitle');
    const meta1 = document.getElementById('meta1');
    const meta2 = document.getElementById('meta2');
    const meta3 = document.getElementById('meta3');

    const iconSun = document.getElementById('iconSun');
    const iconCloud = document.getElementById('iconCloud');
    const iconRain = document.getElementById('iconRain');
    const iconMoon = document.getElementById('iconMoon');

    function selected(name) {
      return document.querySelector(`input[name="${name}"]:checked`)?.value;
    }

    function buildRain() {
      rainHost.innerHTML = '';
      const counts = { drop: 26, streak: 10, splash: 8 };
      for (let i = 0; i < counts.drop; i++) {
        const d = document.createElement('span');
        d.className = 'drop';
        d.style.left = `${Math.random() * 100}%`;
        d.style.top = `${Math.random() * -90}%`;
        d.style.animationDuration = `${0.7 + Math.random() * 0.6}s`;
        d.style.animationDelay = `${Math.random() * 1.8}s`;
        d.style.opacity = `${0.45 + Math.random() * 0.45}`;
        d.style.transform = `scale(${0.6 + Math.random() * 0.8})`;
        rainHost.appendChild(d);
      }
      for (let i = 0; i < counts.streak; i++) {
        const s = document.createElement('span');
        s.className = 'streak';
        s.style.left = `${Math.random() * 100}%`;
        s.style.top = `${Math.random() * -110}%`;
        s.style.animationDuration = `${0.55 + Math.random() * 0.45}s`;
        s.style.animationDelay = `${Math.random() * 1.6}s`;
        s.style.opacity = `${0.25 + Math.random() * 0.4}`;
        rainHost.appendChild(s);
      }
      for (let i = 0; i < counts.splash; i++) {
        const sp = document.createElement('span');
        sp.className = 'splash';
        sp.style.left = `${8 + Math.random() * 84}%`;
        sp.style.bottom = `${8 + Math.random() * 4}%`;
        sp.style.animationDelay = `${Math.random() * 2.5}s`;
        rainHost.appendChild(sp);
      }
    }

    function update() {
      const time = selected('time');
      const temp = selected('temp');
      const rain = selected('rain');
      const cloud = selected('cloud');
      const wind = selected('wind');

      screen.className = `screen ${time} ${temp}`;
      if (rain === 'rainy') screen.classList.add('rainy');
      if (cloud !== 'clear') screen.classList.add('cloudy');
      if (cloud === 'overcast') screen.classList.add('overcast');
      if (wind === 'windy') screen.classList.add('windy');

      iconSun.style.display = (time === 'day' || time === 'sunset') ? 'block' : 'none';
      iconMoon.style.display = time === 'night' ? 'block' : 'none';
      iconRain.style.opacity = rain === 'rainy' ? '1' : '0';
      iconCloud.style.opacity = (cloud !== 'clear' || rain === 'rainy') ? '1' : '0.55';

      const tempMap = {
        hot: { v: '31.4', s: 'Feels like 35°' },
        mild: { v: '11.9', s: 'Feels like 7.5°' },
        cool: { v: '7.2', s: 'Feels like 3.8°' },
        cold: { v: '1.8', s: 'Feels like -2.0°' }
      };
      tempValue.textContent = tempMap[temp].v;
      subtitle.textContent = tempMap[temp].s;

      meta1.textContent = rain === 'rainy' ? 'Rain active' : 'Clear';
      meta2.textContent = wind === 'windy' ? 'Windy' : 'Calm wind';
      meta3.textContent = cloud === 'overcast' ? 'Overcast' : cloud === 'cloudy' ? 'Cloudy' : 'Low cloud';

      const desc = time === 'night' ? 'Night sky' : time === 'sunset' ? 'Sunset glow' : 'Daylight sky';
      document.title = `${desc} · Weather Card Tester`;
    }

    document.querySelectorAll('input[type="radio"]').forEach(r => r.addEventListener('change', update));
    buildRain();
    update();
  </script>
</body>
</html>
