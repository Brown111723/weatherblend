<!-- @dsCard group="Type" viewport="700x150" name="Font families" subtitle="System UI for chrome, monospace for the forecast table" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--wb-bg);color:var(--wb-text);}
  .wrap{padding:22px;display:flex;flex-direction:column;gap:18px;}
  .lbl{font-family:var(--wb-font-sans);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--wb-text-dim);margin-bottom:4px;}
  .sans{font-family:var(--wb-font-sans);font-size:26px;font-weight:600;}
  .mono{font-family:var(--wb-font-mono);font-size:22px;letter-spacing:1px;}
  .stack{font-family:var(--wb-font-mono);font-size:10.5px;color:var(--wb-text-dim);margin-top:2px;}
</style></head>
<body><div class="wrap">
  <div><div class="lbl">Sans — UI chrome</div><div class="sans">Multi-model weather, blended</div><div class="stack">system-ui, -apple-system, Segoe UI, Roboto…</div></div>
  <div><div class="lbl">Mono — data table</div><div class="mono">24°  0.4mm  22km/h  60%</div><div class="stack">ui-monospace, SF Mono, Menlo, Consolas…</div></div>
</div></body></html>
