<!-- @dsCard group="Type" viewport="700x180" name="Labels & body" subtitle="Uppercase eyebrows, card titles and body copy" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--wb-bg);color:var(--wb-text);font-family:var(--wb-font-sans);}
  .wrap{padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--wb-text-dim);}
  .title{font-size:11px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:var(--q-rain);}
  .body{font-size:14px;color:var(--wb-text-muted);line-height:1.6;max-width:520px;}
  .cap{font-size:10px;color:var(--wb-text-dim);font-family:var(--wb-font-mono);}
</style></head>
<body><div class="wrap">
  <div><div class="eyebrow">Forecast accuracy</div><div class="cap">eyebrow · 11px / 700 / +1.5px / uppercase / dim</div></div>
  <div><div class="title">Rain</div><div class="cap">card title · 11px / 700 / +1.1px / metric hue</div></div>
  <div><div class="body">Multi-model blends are consistently more accurate than any single model. Each model is weighted by how well it has recently matched observations.</div><div class="cap">body · 14px / muted / 1.6</div></div>
</div></body></html>
