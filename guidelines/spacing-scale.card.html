<!-- @dsCard group="Spacing" viewport="700x140" name="Spacing scale" subtitle="Compact, mobile-first rhythm (3 → 28px)" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--wb-bg);color:var(--wb-text);font-family:var(--wb-font-sans);}
  .wrap{padding:22px;display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;}
  .u{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar{background:var(--q-rain);border-radius:3px;width:20px;}
  .v{font-size:10px;color:var(--wb-text-dim);font-family:var(--wb-font-mono);}
</style></head>
<body><div class="wrap">
  <div class="u"><div class="bar" style="height:3px"></div><div class="v">1 · 3</div></div>
  <div class="u"><div class="bar" style="height:6px"></div><div class="v">2 · 6</div></div>
  <div class="u"><div class="bar" style="height:8px"></div><div class="v">3 · 8</div></div>
  <div class="u"><div class="bar" style="height:10px"></div><div class="v">4 · 10</div></div>
  <div class="u"><div class="bar" style="height:12px"></div><div class="v">5 · 12</div></div>
  <div class="u"><div class="bar" style="height:14px"></div><div class="v">6 · 14</div></div>
  <div class="u"><div class="bar" style="height:16px"></div><div class="v">7 · 16</div></div>
  <div class="u"><div class="bar" style="height:20px"></div><div class="v">8 · 20</div></div>
  <div class="u"><div class="bar" style="height:28px"></div><div class="v">9 · 28</div></div>
</div></body></html>
