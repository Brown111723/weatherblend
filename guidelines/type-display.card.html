<!-- @dsCard group="Type" viewport="700x180" name="Display scale" subtitle="The giant 'now' temperature and secondary big figures" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--wb-bg);color:var(--wb-text);font-family:var(--wb-font-sans);}
  .wrap{padding:18px 24px;display:flex;align-items:baseline;gap:32px;flex-wrap:wrap;}
  .hero{font-size:54px;font-weight:275;letter-spacing:-2.5px;line-height:1;color:var(--q-temp);}
  .hero .lo{font-size:26px;font-weight:300;color:var(--wb-text-muted);margin-left:8px;letter-spacing:-1px;}
  .metric{font-size:25px;font-weight:700;letter-spacing:-.5px;}
  .cap{font-size:10px;color:var(--wb-text-dim);font-family:var(--wb-font-mono);margin-top:6px;}
  .col{display:flex;flex-direction:column;}
</style></head>
<body><div class="wrap">
  <div class="col"><div class="hero">24°<span class="lo">14°</span></div><div class="cap">hero · 54px / 275 / -2.5px</div></div>
  <div class="col"><div class="metric">22 km/h</div><div class="cap">metric · 25px / 700 / -.5px</div></div>
</div></body></html>
