<!-- @dsCard group="Colors" viewport="700x160" name="Surfaces & borders" subtitle="Dark, cool, near-black navy — the app canvas and its raised planes" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:#000;font-family:var(--wb-font-sans);color:var(--wb-text);}
  .wrap{padding:20px;display:flex;gap:12px;flex-wrap:wrap;}
  .sw{flex:1;min-width:110px;display:flex;flex-direction:column;gap:8px;}
  .chip{height:52px;border-radius:var(--wb-radius-lg);border:1px solid var(--wb-border);}
  .n{font-size:12px;font-weight:600;}
  .v{font-size:10.5px;color:var(--wb-text-dim);font-family:var(--wb-font-mono);}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:var(--wb-bg)"></div><div class="n">Canvas</div><div class="v">--wb-bg · #0c0f15</div></div>
  <div class="sw"><div class="chip" style="background:var(--wb-surface)"></div><div class="n">Surface</div><div class="v">--wb-surface · #141922</div></div>
  <div class="sw"><div class="chip" style="background:var(--wb-surface-2)"></div><div class="n">Surface 2</div><div class="v">--wb-surface-2 · #1a2130</div></div>
  <div class="sw"><div class="chip" style="background:var(--wb-border)"></div><div class="n">Border</div><div class="v">--wb-border · #1f2733</div></div>
  <div class="sw"><div class="chip" style="background:var(--wb-border-2)"></div><div class="n">Border 2</div><div class="v">--wb-border-2 · #2b3647</div></div>
</div></body></html>
