<!-- @dsCard group="Explorations" viewport="430x860" name="Continuous timelines" subtitle="Weather as flowing data streams — no cards, one shared time axis" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeatherBlend — Timelines</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;background:#05070b;height:100%;}
  #root{height:100%;}
  a{color:var(--wb-accent);} a:hover{color:var(--wb-accent-press);}
  .phone{position:relative;width:100%;max-width:430px;min-height:100vh;margin:0 auto;background:var(--wb-bg);color:var(--wb-text);font-family:var(--wb-font-sans);display:flex;flex-direction:column;overflow:hidden;}
  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:#2b3647;border-radius:6px;border:2px solid var(--wb-bg);}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script>
// Fake forecast data for the WeatherBlend UI-kit recreation.
// Shapes mirror the real app (hourly + daily summaries per model blend).
(function () {
  const HOURS = Array.from({ length: 24 }, (_, h) => h);

  // A day's hourly temp/rain/wind/cloud (blended). Smooth diurnal curves.
  function dayHourly(seed) {
    const temp = [], rain = [], wind = [], cloud = [];
    for (let h = 0; h < 24; h++) {
      const t = seed.base + seed.amp * Math.sin(((h - 9) / 24) * Math.PI * 2 - Math.PI / 2);
      temp.push(+(t).toFixed(1));
      const r = seed.rainHours.includes(h) ? seed.rainAmt * (0.6 + Math.random() * 0.8) : (Math.random() < 0.08 ? 0.1 : 0);
      rain.push(+r.toFixed(1));
      wind.push(Math.round(seed.windBase + seed.windAmp * Math.abs(Math.sin(h / 5)) + (Math.random() * 4 - 2)));
      cloud.push(Math.max(0, Math.min(100, Math.round(seed.cloudBase + seed.cloudAmp * Math.sin(h / 6 + 1) + (Math.random() * 14 - 7)))));
    }
    return { temp, rain, wind, cloud };
  }

  const SEEDS = [
    { dow: 'Mon', code: 3, base: 15, amp: 5, rainHours: [], rainAmt: 0, windBase: 10, windAmp: 12, cloudBase: 55, cloudAmp: 30 },
    { dow: 'Tue', code: 61, base: 13, amp: 4, rainHours: [7, 8, 9, 14, 15], rainAmt: 0.9, windBase: 16, windAmp: 16, cloudBase: 80, cloudAmp: 15 },
    { dow: 'Wed', code: 2, base: 18, amp: 7, rainHours: [16], rainAmt: 0.3, windBase: 9, windAmp: 10, cloudBase: 35, cloudAmp: 30 },
    { dow: 'Thu', code: 0, base: 21, amp: 8, rainHours: [], rainAmt: 0, windBase: 7, windAmp: 8, cloudBase: 12, cloudAmp: 15 },
    { dow: 'Fri', code: 80, base: 17, amp: 6, rainHours: [11, 12, 13, 17, 18], rainAmt: 1.6, windBase: 22, windAmp: 18, cloudBase: 78, cloudAmp: 18 },
    { dow: 'Sat', code: 1, base: 19, amp: 7, rainHours: [], rainAmt: 0, windBase: 11, windAmp: 12, cloudBase: 28, cloudAmp: 25 },
    { dow: 'Sun', code: 45, base: 14, amp: 4, rainHours: [6, 7], rainAmt: 0.2, windBase: 6, windAmp: 6, cloudBase: 70, cloudAmp: 20 },
  ];

  const days = SEEDS.map((s, i) => {
    const hourly = dayHourly(s);
    const hi = Math.max(...hourly.temp), lo = Math.min(...hourly.temp);
    const rainSum = +hourly.rain.reduce((a, b) => a + b, 0).toFixed(1);
    const windHi = Math.max(...hourly.wind), windLo = Math.min(...hourly.wind);
    const cloudMean = Math.round(hourly.cloud.reduce((a, b) => a + b, 0) / 24);
    return {
      idx: i, dow: s.dow, code: s.code, hourly,
      hi, lo, rainSum, windHi, windLo, cloudMean,
      windDir: 'NE',
      rise: 0.28, set: 0.80,
      past: i < 1,
      conf: { temp: 78 + i % 3 * 5, rain: 55 + i % 4 * 8, wind: 62, cloud: 70 },
    };
  });

  const models = [
    { key: 'gfs', w: 0.20 }, { key: 'ecmwf', w: 0.26 }, { key: 'icon', w: 0.16 },
    { key: 'gem', w: 0.13 }, { key: 'ukmo', w: 0.11 }, { key: 'cma', w: 0.08 }, { key: 'jma', w: 0.06 },
  ];

  window.WB_DATA = { days, models, hours: HOURS, location: { name: 'Orange NSW', detail: 'AU · 148.4°E 33.3°S', nowHour: 13 } };
})();

</script>
<script>
// streams-data.js — flattens WB_DATA's per-day hourly series into one
// continuous 168-hour stream per metric, plus per-hour model spread
// (synthetic: wider on rainy days and further into the future).
(function () {
  const D = window.WB_DATA;
  const T = [], R = [], W = [], C = [], SPREAD = [];
  D.days.forEach((d, di) => {
    const chaos = d.rainSum > 2 ? 1.9 : d.rainSum > 0.3 ? 1.3 : 1;
    for (let h = 0; h < 24; h++) {
      T.push(d.hourly.temp[h]);
      R.push(d.hourly.rain[h]);
      W.push(d.hourly.wind[h]);
      C.push(d.hourly.cloud[h]);
      // 0..1 disagreement: grows with lead time and weather chaos
      SPREAD.push(Math.min(1, (0.10 + di * 0.055) * chaos));
    }
  });
  const NOW = 1 * 24 + D.location.nowHour; // absolute hour of "now" (day 1 = today)
  window.WB_STREAMS = { temp: T, rain: R, wind: W, cloud: C, spread: SPREAD, NOW, HOURS: T.length };
})();

</script>
<script type="text/babel">
// WeekRibbons — four continuous 7-day mini-timelines (temp / rain / wind /
// cloud). No boxes: hairline dividers only. The ribbons run edge-to-edge
// and fade out at both sides, implying the data continues. A soft vertical
// highlight marks the selected day; tap anywhere (or a day label) to move it.
const RB_COL = { temp: '#7EE8A5', rain: '#5FA4FF', wind: '#A8E63E', cloud: '#C8A6FF' };

function rbPath(vals, W, H, mn, mx, pad = 2) {
  const n = vals.length;
  const X = (i) => (i / (n - 1)) * W;
  const Y = (v) => (H - pad) - ((v - mn) / (mx - mn || 1)) * (H - pad * 2);
  let d = '';
  for (let i = 0; i < n; i++) d += (i ? 'L' : 'M') + X(i).toFixed(1) + ' ' + Y(vals[i]).toFixed(1);
  return d;
}

function WeekRibbons({ sel, onSel }) {
  const S = window.WB_STREAMS;
  const D = window.WB_DATA;
  if (!S || !D) return null;
  const W = 400, RH = 26, N = S.HOURS;
  const metrics = ['temp', 'rain', 'wind', 'cloud'];
  const ranges = {
    temp: [Math.min(...S.temp), Math.max(...S.temp)],
    rain: [0, Math.max(0.5, Math.max(...S.rain))],
    wind: [0, Math.max(...S.wind)],
    cloud: [0, 100],
  };
  const dayW = W / 7;
  const nowX = (S.NOW / (N - 1)) * W;

  const click = (e) => {
    const r = e.currentTarget.getBoundingClientRect();
    const day = Math.max(0, Math.min(6, Math.floor(((e.clientX - r.left) / r.width) * 7)));
    onSel(day);
  };

  return (
    <div style={{ position: 'relative', cursor: 'pointer', userSelect: 'none' }} onClick={click}>
      {/* day labels */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', padding: '0 0 2px' }}>
        {D.days.map((d, i) => (
          <span key={i} style={{
            textAlign: 'center', fontSize: 10, fontWeight: i === sel ? 800 : 600, letterSpacing: '.6px', textTransform: 'uppercase',
            color: i === sel ? 'var(--wb-text)' : i === 1 ? 'var(--wb-text-muted)' : 'var(--wb-text-dim)',
            transition: 'color .3s',
          }}>{d.dow}{i === 1 && <span style={{ color: 'var(--wb-accent)' }}> •</span>}</span>
        ))}
      </div>

      <div style={{ position: 'relative' }}>
        <svg viewBox={`0 0 ${W} ${metrics.length * RH}`} width="100%" style={{ display: 'block' }}>
          <defs>
            <linearGradient id="rbFade" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stopColor="#fff" stopOpacity="0" />
              <stop offset="0.045" stopColor="#fff" stopOpacity="1" />
              <stop offset="0.955" stopColor="#fff" stopOpacity="1" />
              <stop offset="1" stopColor="#fff" stopOpacity="0" />
            </linearGradient>
            <mask id="rbMask"><rect x="0" y="0" width={W} height={metrics.length * RH} fill="url(#rbFade)" /></mask>
          </defs>

          {/* selected-day highlight */}
          <rect x={sel * dayW} y="0" width={dayW} height={metrics.length * RH} fill="rgba(96,165,250,.07)" rx="4"
            style={{ transition: 'x .45s cubic-bezier(.4,0,.2,1)' }} />

          <g mask="url(#rbMask)">
            {metrics.map((m, mi) => (
              <g key={m} transform={`translate(0 ${mi * RH})`}>
                <path d={rbPath(S[m], W, RH, ranges[m][0], ranges[m][1], 4)} fill="none"
                  stroke={RB_COL[m]} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"
                  opacity="0.85" vectorEffect="non-scaling-stroke" />
              </g>
            ))}
            {/* past dimmer */}
            <rect x="0" y="0" width={nowX} height={metrics.length * RH} fill="rgba(12,15,21,.55)" />
          </g>

          {/* day dividers */}
          {Array.from({ length: 6 }, (_, i) => (
            <line key={i} x1={(i + 1) * dayW} y1="0" x2={(i + 1) * dayW} y2={metrics.length * RH} stroke="var(--wb-border)" strokeWidth="1" opacity="0.6" />
          ))}

          {/* now marker */}
          <line x1={nowX} y1="-2" x2={nowX} y2={metrics.length * RH + 2} stroke="var(--wb-now)" strokeWidth="1.2" opacity="0.8" />

          {/* selected-day marker line */}
          <line x1={sel * dayW + dayW / 2} y1="-3" x2={sel * dayW + dayW / 2} y2={metrics.length * RH + 3}
            stroke="var(--wb-text-muted)" strokeWidth="1" strokeDasharray="2 3" opacity="0.7"
            style={{ transition: 'x1 .45s cubic-bezier(.4,0,.2,1), x2 .45s cubic-bezier(.4,0,.2,1)' }} />
        </svg>
      </div>
    </div>
  );
}
window.WeekRibbons = WeekRibbons;

</script>
<script type="text/babel">
// HourlyStreams — the main view: four large stream visualisations in ONE
// shared SVG with a common time axis. Not a paged card: the 24h window is
// a slice of the continuous 168h stream, and changing day TWEENS the
// window along it, so you slide through the data rather than flip pages.
//
// Visual languages:
//   Temp  — smooth glowing line; ribbon width + glow softness = model spread
//   Rain  — minimalist bars; height = intensity, animated fades
//   Wind  — rippling waveform on a baseline; amplitude = gustiness,
//           core thickness = sustained speed
//   Cloud — constant-width ribbon; opacity = cover %
// Shared: glowing "now" line, sunrise/sunset ticks, night dimming.
const ST_COL = { temp: '#7EE8A5', rain: '#5FA4FF', wind: '#A8E63E', cloud: '#C8A6FF' };
const easeIO = (t) => (t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2);

// smooth catmull-rom-ish path through points
function smoothPath(pts) {
  if (!pts.length) return '';
  let d = `M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
  for (let i = 1; i < pts.length; i++) {
    const [x0, y0] = pts[i - 1], [x1, y1] = pts[i];
    const mx = (x0 + x1) / 2;
    d += ` C ${mx.toFixed(1)} ${y0.toFixed(1)}, ${mx.toFixed(1)} ${y1.toFixed(1)}, ${x1.toFixed(1)} ${y1.toFixed(1)}`;
  }
  return d;
}

function useWindowTween(target, ms = 650) {
  const [cur, setCur] = React.useState(target);
  const ref = React.useRef({ raf: 0 });
  React.useEffect(() => {
    const from = cur, t0 = performance.now();
    cancelAnimationFrame(ref.current.raf);
    const step = (now) => {
      const p = Math.min(1, (now - t0) / ms);
      setCur(from + (target - from) * easeIO(p));
      if (p < 1) ref.current.raf = requestAnimationFrame(step);
    };
    ref.current.raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(ref.current.raf);
  }, [target]);
  return cur;
}

// slow shared clock for ambient animation (wind ripple, temp glow breathe)
function useClock() {
  const [t, setT] = React.useState(0);
  React.useEffect(() => {
    let raf, on = true;
    const loop = (now) => { if (!on) return; setT(now / 1000); raf = requestAnimationFrame(loop); };
    const mq = window.matchMedia('(prefers-reduced-motion: reduce)');
    if (!mq.matches) raf = requestAnimationFrame(loop);
    return () => { on = false; cancelAnimationFrame(raf); };
  }, []);
  return t;
}

function HourlyStreams({ sel }) {
  const S = window.WB_STREAMS;
  const D = window.WB_DATA;
  if (!S || !D) return null;
  const W = 400, LANE = 96, GAP = 30, AXIS = 26;
  const lanes = ['temp', 'rain', 'wind', 'cloud'];
  const TOTALH = lanes.length * (LANE + GAP) + AXIS;
  const winStart = useWindowTween(sel * 24);
  const clock = useClock();

  const H2X = (h) => ((h - winStart) / 24) * W;         // absolute hour → x
  const visible = []; // integer hours in/near window
  for (let h = Math.floor(winStart) - 1; h <= Math.ceil(winStart) + 25; h++) if (h >= 0 && h < S.HOURS) visible.push(h);

  const laneY = (i) => i * (LANE + GAP) + 18;

  // ── per-lane scales over the FULL week so sliding never rescales ──
  const sc = {
    temp: [Math.min(...S.temp) - 1, Math.max(...S.temp) + 1],
    rain: [0, Math.max(1.2, Math.max(...S.rain) * 1.1)],
    wind: [0, Math.max(...S.wind) * 1.15],
    cloud: [0, 100],
  };
  const Y = (m, v, y0) => y0 + LANE - ((v - sc[m][0]) / (sc[m][1] - sc[m][0])) * LANE;

  // ── night dimming + sun ticks from per-day rise/set ──
  const nights = [], suns = [];
  D.days.forEach((d, di) => {
    const rise = di * 24 + d.rise * 23, set = di * 24 + d.set * 23;
    nights.push([di * 24, rise], [set, di * 24 + 24]);
    suns.push({ h: rise, kind: 'rise' }, { h: set, kind: 'set' });
  });

  // ── temp lane geometry ──
  const y0t = laneY(0);
  const tempPts = visible.map((h) => [H2X(h), Y('temp', S.temp[h], y0t)]);
  const spreadAt = (h) => S.spread[Math.max(0, Math.min(S.HOURS - 1, h))];
  const meanSpread = visible.reduce((a, h) => a + spreadAt(h), 0) / visible.length;
  const ribbonW = 3 + meanSpread * 13;         // model disagreement → width
  const glowW = 10 + meanSpread * 22;
  const glowPulse = 0.5 + 0.18 * Math.sin(clock * 1.1);
  // hi/lo of the selected day
  const dayHours = Array.from({ length: 24 }, (_, i) => sel * 24 + i);
  let hiH = dayHours[0], loH = dayHours[0];
  dayHours.forEach((h) => { if (S.temp[h] > S.temp[hiH]) hiH = h; if (S.temp[h] < S.temp[loH]) loH = h; });

  // ── wind lane: rippling waveform ──
  const y0w = laneY(2);
  const windBase = y0w + LANE * 0.55;
  const windPath = (off) => {
    const pts = [];
    for (let px = 0; px <= W; px += 5) {
      const h = winStart + (px / W) * 24;
      const hi = Math.max(0, Math.min(S.HOURS - 1, Math.floor(h)));
      const sp = S.wind[hi];
      const gust = (sp / sc.wind[1]) * (0.5 + spreadAt(hi));  // gustiness
      const amp = 2 + gust * 13;
      const y = windBase - (sp / sc.wind[1]) * LANE * 0.42
        + Math.sin(px * 0.09 + clock * 2.2 + off) * amp * 0.4
        + Math.sin(px * 0.023 - clock * 1.1 + off * 2) * amp * 0.6;
      pts.push([px, y]);
    }
    return pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  };
  const windMean = visible.reduce((a, h) => a + S.wind[h], 0) / visible.length;
  const windCoreW = 1.2 + (windMean / sc.wind[1]) * 3.4;

  // ── cloud lane: constant-width ribbon, opacity = cover ──
  const y0c = laneY(3);
  const cloudStops = visible.map((h) => {
    const x = Math.max(0, Math.min(1, H2X(h) / W));
    return `<stop offset="${(x * 100).toFixed(1)}%" stop-color="${ST_COL.cloud}" stop-opacity="${(0.04 + (S.cloud[h] / 100) * 0.75).toFixed(2)}"/>`;
  }).join('');

  const y0r = laneY(1);
  const barW = W / 24 * 0.42;

  const lbl = { fontSize: 10, fontWeight: 700, letterSpacing: '1.2px', textTransform: 'uppercase' };

  const fmtHr = (h) => { const hh = Math.round(h) % 24; return hh === 0 ? '12a' : hh < 12 ? hh + 'a' : hh === 12 ? '12p' : (hh - 12) + 'p'; };

  return (
    <svg viewBox={`0 0 ${W} ${TOTALH}`} width="100%" style={{ display: 'block', overflow: 'hidden' }}>
      <defs>
        <linearGradient id="cloudRibbon" x1="0" y1="0" x2="1" y2="0" dangerouslySetInnerHTML={{ __html: cloudStops }} />
        <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation={2 + meanSpread * 3} /></filter>
        <filter id="glowNow" x="-300%" y="-5%" width="700%" height="110%"><feGaussianBlur stdDeviation="2.4" /></filter>
      </defs>

      {/* ── night dimming (before sunrise / after sunset) ── */}
      {nights.map(([a, b], i) => {
        const x1 = Math.max(0, H2X(a)), x2 = Math.min(W, H2X(b));
        if (x2 <= 0 || x1 >= W || x2 - x1 <= 0) return null;
        return <rect key={i} x={x1} y="0" width={x2 - x1} height={TOTALH - AXIS + 8} fill="#05070b" opacity="0.34" />;
      })}

      {/* ═══ TEMP — glowing line + confidence ribbon ═══ */}
      <text x="0" y={y0t - 7} fill={ST_COL.temp} style={lbl}>Temp</text>
      <text x={W} y={y0t - 7} textAnchor="end" fill="var(--wb-text-dim)" style={{ fontSize: 10, fontWeight: 600 }}>
        {Math.round(S.temp[hiH])}° / {Math.round(S.temp[loH])}°
      </text>
      <path d={smoothPath(tempPts)} fill="none" stroke={ST_COL.temp} strokeWidth={glowW} strokeLinecap="round" opacity={0.10 * glowPulse * 2} filter="url(#soft)" />
      <path d={smoothPath(tempPts)} fill="none" stroke={ST_COL.temp} strokeWidth={ribbonW} strokeLinecap="round" opacity="0.16" />
      <path d={smoothPath(tempPts)} fill="none" stroke={ST_COL.temp} strokeWidth="2" strokeLinecap="round" opacity="0.95" />
      {[hiH, loH].map((h, i) => {
        const x = H2X(h); if (x < -10 || x > W + 10) return null;
        const y = Y('temp', S.temp[h], y0t);
        return (
          <g key={i}>
            <circle cx={x} cy={y} r="3" fill="var(--wb-bg)" stroke={ST_COL.temp} strokeWidth="1.6" />
            <text x={x} y={y + (i ? 16 : -9)} textAnchor="middle" fill="var(--wb-text-muted)" style={{ fontSize: 10.5, fontWeight: 700 }}>{Math.round(S.temp[h])}°</text>
          </g>
        );
      })}

      {/* ═══ RAIN — minimalist bars ═══ */}
      <text x="0" y={y0r - 7} fill={ST_COL.rain} style={lbl}>Rain</text>
      <text x={W} y={y0r - 7} textAnchor="end" fill="var(--wb-text-dim)" style={{ fontSize: 10, fontWeight: 600 }}>
        {(dayHours.reduce((a, h) => a + S.rain[h], 0)).toFixed(1)} mm day
      </text>
      <line x1="0" y1={y0r + LANE} x2={W} y2={y0r + LANE} stroke="var(--wb-border)" strokeWidth="1" />
      {visible.map((h) => {
        const v = S.rain[h]; if (v < 0.03) return null;
        const x = H2X(h), bh = Math.max(2.5, (v / sc.rain[1]) * LANE);
        return <rect key={h} x={x - barW / 2} y={y0r + LANE - bh} width={barW} height={bh} rx={barW / 2}
          fill={ST_COL.rain} opacity={0.5 + Math.min(0.45, v / 3)} style={{ transition: 'opacity .6s' }} />;
      })}

      {/* ═══ WIND — rippling waveform ═══ */}
      <text x="0" y={y0w - 7} fill={ST_COL.wind} style={lbl}>Wind</text>
      <text x={W} y={y0w - 7} textAnchor="end" fill="var(--wb-text-dim)" style={{ fontSize: 10, fontWeight: 600 }}>{Math.round(windMean)} km/h NE</text>
      <line x1="0" y1={windBase} x2={W} y2={windBase} stroke="var(--wb-border)" strokeWidth="1" strokeDasharray="2 4" opacity="0.7" />
      <path d={windPath(1.7)} fill="none" stroke={ST_COL.wind} strokeWidth={windCoreW * 0.5} opacity="0.22" />
      <path d={windPath(0)} fill="none" stroke={ST_COL.wind} strokeWidth={windCoreW} strokeLinecap="round" opacity="0.8" />

      {/* ═══ CLOUD — opacity ribbon ═══ */}
      <text x="0" y={y0c - 7} fill={ST_COL.cloud} style={lbl}>Cloud</text>
      <text x={W} y={y0c - 7} textAnchor="end" fill="var(--wb-text-dim)" style={{ fontSize: 10, fontWeight: 600 }}>
        {Math.round(dayHours.reduce((a, h) => a + S.cloud[h], 0) / 24)}% mean
      </text>
      <rect x="0" y={y0c + LANE * 0.28} width={W} height={LANE * 0.34} rx={LANE * 0.17} fill="url(#cloudRibbon)" style={{ transition: 'opacity 1.2s' }} />

      {/* ── shared axis ── */}
      {[0, 6, 12, 18, 24].map((hh) => {
        const x = H2X(Math.round(winStart) + hh);
        return <text key={hh} x={Math.max(8, Math.min(W - 8, x))} y={TOTALH - 8} textAnchor="middle" fill="var(--wb-text-dim)" style={{ fontSize: 10, fontWeight: 600, fontFamily: 'var(--wb-font-mono)' }}>{fmtHr(winStart + hh)}</text>;
      })}
      {/* sunrise / sunset ticks on the axis */}
      {suns.map((s, i) => {
        const x = H2X(s.h); if (x < 4 || x > W - 4) return null;
        const y = TOTALH - AXIS + 4;
        return (
          <g key={i} stroke="var(--wb-sun)" strokeWidth="1.4" strokeLinecap="round" fill="none" opacity="0.9">
            <circle cx={x} cy={y + 3} r="2.6" />
            <line x1={x - 5.5} y1={y + 7} x2={x + 5.5} y2={y + 7} />
            <path d={s.kind === 'rise' ? `M ${x - 2.5} ${y - 3} L ${x} ${y - 6} L ${x + 2.5} ${y - 3}` : `M ${x - 2.5} ${y - 6} L ${x} ${y - 3} L ${x + 2.5} ${y - 6}`} />
          </g>
        );
      })}

      {/* ── the shared glowing NOW line ── */}
      {(() => {
        const x = H2X(S.NOW);
        if (x < -6 || x > W + 6) return null;
        return (
          <g>
            <line x1={x} y1="4" x2={x} y2={TOTALH - AXIS + 10} stroke="var(--wb-now)" strokeWidth="5" opacity={0.25 + 0.12 * Math.sin(clock * 1.4)} filter="url(#glowNow)" />
            <line x1={x} y1="4" x2={x} y2={TOTALH - AXIS + 10} stroke="var(--wb-now)" strokeWidth="1.3" opacity="0.9" />
            <text x={x} y="0" textAnchor="middle" dominantBaseline="hanging" fill="var(--wb-now)" style={{ fontSize: 8.5, fontWeight: 800, letterSpacing: '1px' }}>NOW</text>
          </g>
        );
      })()}
    </svg>
  );
}
window.HourlyStreams = HourlyStreams;

</script>
<script type="text/babel">
// Timelines exploration shell — chrome-less, whitespace-led. Header,
// continuous week ribbons, big hourly streams, and a compact secondary-
// metrics strip. No cards, no boxes: hairline dividers only.

function SecondaryStrip() {
  const items = [['UV', '5 mod'], ['Humidity', '62%'], ['Pressure', '1014'], ['Visibility', '10 km'], ['AQI', '23 good']];
  return (
    <div style={{ display: 'flex', gap: 4, overflowX: 'auto', padding: '10px 0 2px' }}>
      {items.map(([k, v]) => (
        <div key={k} style={{ flex: '0 0 auto', display: 'flex', alignItems: 'baseline', gap: 6, padding: '5px 12px', borderRadius: 999, border: '1px solid var(--wb-border)' }}>
          <span style={{ fontSize: 9.5, fontWeight: 700, letterSpacing: '.8px', textTransform: 'uppercase', color: 'var(--wb-text-dim)' }}>{k}</span>
          <span style={{ fontSize: 12.5, fontWeight: 600, color: 'var(--wb-text-muted)' }}>{v}</span>
        </div>
      ))}
    </div>
  );
}

function App() {
  const { Logo } = window.WeatherBlendDesignSystem_0cb5aa;
  const D = window.WB_DATA;
  const [sel, setSel] = React.useState(1);
  const day = D.days[sel];
  const isToday = sel === 1;
  const dates = ['Mar 3', 'Mar 4', 'Mar 5', 'Mar 6', 'Mar 7', 'Mar 8', 'Mar 9'];
  const bigTemp = Math.round(isToday ? day.hourly.temp[13] : day.hi);

  return (
    <div className="phone">
      {/* header — type only, no bar */}
      <header style={{ padding: '16px 18px 6px', display: 'flex', alignItems: 'flex-start', gap: 12 }}>
        <Logo size={26} />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 16, fontWeight: 700, letterSpacing: '-.2px' }}>Orange NSW</div>
          <div style={{ fontSize: 10.5, color: 'var(--wb-text-dim)', fontWeight: 600, letterSpacing: '1px', textTransform: 'uppercase', marginTop: 1 }}>
            {isToday ? 'Today' : day.dow} · {dates[sel]} · 7-model blend
          </div>
        </div>
        <div style={{ fontSize: 40, fontWeight: 275, letterSpacing: '-2px', lineHeight: 0.9, color: 'var(--q-temp)' }}>{bigTemp}°</div>
      </header>

      <div style={{ flex: 1, overflowY: 'auto', padding: '10px 15px 30px' }}>
        {/* week ribbons */}
        <window.WeekRibbons sel={sel} onSel={setSel} />

        <div style={{ height: 1, background: 'var(--wb-border)', margin: '14px 0 18px', opacity: 0.8 }}></div>

        {/* hourly streams */}
        <window.HourlyStreams sel={sel} />

        <div style={{ height: 1, background: 'var(--wb-border)', margin: '8px 0 2px', opacity: 0.8 }}></div>

        {/* secondary metrics — deliberately quiet */}
        <SecondaryStrip />

        <div style={{ fontSize: 11, color: 'var(--wb-text-dim)', lineHeight: 1.55, padding: '14px 2px 0' }}>
          Ribbon width and glow softness show model disagreement — crisp means the seven models agree.
          Tap a day above: the view slides along the continuous stream rather than turning a page.
        </div>
      </div>
    </div>
  );
}
if (window.WB_DATA && window.WeatherBlendDesignSystem_0cb5aa && document.getElementById('root')) {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}

</script>
