
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WeatherBlend — Ambient</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    font-family: system-ui, Arial;
    background: #000;
    color: white;
}

/* =========================
   BASE SKY LAYER
========================= */
#sky {
    position: fixed;
    inset: 0;
    transition: background 2s ease;
    z-index: -3;
}

/* atmospheric haze */
#haze {
    position: fixed;
    inset: 0;
    z-index: -2;
    pointer-events: none;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05), transparent 60%);
    mix-blend-mode: screen;
    opacity: 0.5;
}

/* =========================
   PARTICLE LAYERS
========================= */
.layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
}

/* rain */
.rain::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: repeating-linear-gradient(
        120deg,
        rgba(180,220,255,0.0) 0px,
        rgba(180,220,255,0.0) 4px,
        rgba(180,220,255,0.15) 5px,
        rgba(180,220,255,0.0) 8px
    );
    animation: rainMove 0.6s linear infinite;
    transform: rotate(10deg);
}

@keyframes rainMove {
    from { transform: translateY(-30%) rotate(10deg); }
    to { transform: translateY(30%) rotate(10deg); }
}

/* clouds */
.clouds::before {
    content: "";
    position: absolute;
    inset: -20%;
    background:
        radial-gradient(circle at 30% 40%, rgba(255,255,255,0.08), transparent 40%),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.06), transparent 45%);
    filter: blur(20px);
    animation: drift 25s ease-in-out infinite alternate;
}

@keyframes drift {
    from { transform: translateX(-5%) scale(1.05); }
    to { transform: translateX(5%) scale(1.1); }
}

/* stars */
.stars::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
        radial-gradient(1px 1px at 20% 30%, white, transparent),
        radial-gradient(1px 1px at 70% 20%, white, transparent),
        radial-gradient(1px 1px at 40% 80%, white, transparent),
        radial-gradient(1px 1px at 80% 60%, white, transparent);
    opacity: 0.6;
    animation: twinkle 4s ease-in-out infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.3; }
    to { opacity: 0.8; }
}

/* =========================
   NOW CARD (FOCAL UI)
========================= */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 36px 44px;
    border-radius: 22px;

    background: rgba(10, 12, 18, 0.55);
    backdrop-filter: blur(18px);

    box-shadow:
        0 0 80px rgba(120,160,255,0.08),
        inset 0 0 0 1px rgba(255,255,255,0.05);

    text-align: center;
    min-width: 260px;
}

.temp {
    font-size: 64px;
    font-weight: 600;
    letter-spacing: -2px;
}

.desc {
    opacity: 0.75;
    margin-top: 6px;
    letter-spacing: 1px;
}

.icon {
    font-size: 44px;
    margin-bottom: 8px;
}

/* =========================
   CONTROLS
========================= */
.controls {
    position: fixed;
    bottom: 18px;
    left: 18px;
    display: flex;
    gap: 18px;
}

.panel {
    background: rgba(0,0,0,0.4);
    padding: 10px 12px;
    border-radius: 12px;
    font-size: 13px;
}

label {
    display: block;
    opacity: 0.8;
    cursor: pointer;
    margin: 3px 0;
}

label:hover {
    opacity: 1;
}
</style>
</head>

<body>

<div id="sky"></div>
<div id="haze"></div>

<div id="layer" class="layer"></div>

<div class="card">
    <div class="icon" id="icon">☁️</div>
    <div class="temp" id="temp">21°</div>
    <div class="desc" id="desc">Cloudy</div>
</div>

<div class="controls">
    <div class="panel">
        <strong>Time</strong>
        <label><input type="radio" name="time" value="day" checked> Day</label>
        <label><input type="radio" name="time" value="night"> Night</label>
    </div>

    <div class="panel">
        <strong>Weather</strong>
        <label><input type="radio" name="wx" value="clear"> Clear</label>
        <label><input type="radio" name="wx" value="clouds" checked> Clouds</label>
        <label><input type="radio" name="wx" value="rain"> Rain</label>
    </div>
</div>

<script>
const sky = document.getElementById("sky");
const layer = document.getElementById("layer");
const icon = document.getElementById("icon");
const temp = document.getElementById("temp");
const desc = document.getElementById("desc");

function setSky(time, wx) {

    layer.className = "layer";

    /* =========================
       SKY GRADIENTS (CORE FEEL)
    ========================== */
    if (time === "day") {
        sky.style.background = `
            radial-gradient(circle at 30% 20%, rgba(120,160,255,0.15), transparent 60%),
            linear-gradient(#0b1220, #05070d)
        `;
    } else {
        sky.style.background = `
            radial-gradient(circle at 50% 30%, rgba(120,120,255,0.10), transparent 60%),
            linear-gradient(#03040a, #000000)
        `;
    }

    /* =========================
       WEATHER OVERLAY
    ========================== */
    if (wx === "rain") {
        layer.classList.add("rain");
        icon.textContent = "🌧";
        desc.textContent = "Rain";
        temp.textContent = time === "night" ? "14°" : "17°";
    }

    else if (wx === "clouds") {
        layer.classList.add("clouds");
        icon.textContent = "☁️";
        desc.textContent = "Overcast";
        temp.textContent = time === "night" ? "12°" : "18°";
    }

    else {
        icon.textContent = "🌙";
        desc.textContent = "Clear";
        temp.textContent = time === "night" ? "10°" : "22°";
    }

    /* stars only at night + clear-ish */
    if (time === "night" && wx !== "rain") {
        layer.classList.add("stars");
    }
}

document.querySelectorAll("input").forEach(i => {
    i.addEventListener("change", () => {
        const time = document.querySelector('input[name="time"]:checked').value;
        const wx = document.querySelector('input[name="wx"]:checked').value;
        setSky(time, wx);
    });
});

setSky("day", "clouds");
</script>

</body>
</html>
