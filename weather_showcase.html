<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Weather Showcase</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: Arial, sans-serif;
        overflow: hidden;
        color: white;
    }

    /* ===== BACKGROUND LAYERS ===== */
    .bg {
        position: fixed;
        inset: 0;
        z-index: -2;
        transition: background 1s ease;
    }

    /* animated overlay */
    .animated-overlay {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
    }

    /* rain animation */
    .rain::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background-image: url("https://i.imgur.com/5M0g5Zb.png");
        animation: rain 0.4s linear infinite;
        opacity: 0.25;
    }

    @keyframes rain {
        from { transform: translateY(-50%); }
        to { transform: translateY(0%); }
    }

    /* clouds drifting */
    .clouds {
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), transparent 60%),
                    radial-gradient(circle at 70% 50%, rgba(255,255,255,0.15), transparent 60%);
        animation: drift 20s linear infinite;
    }

    @keyframes drift {
        0% { transform: translateX(-10%); }
        100% { transform: translateX(10%); }
    }

    /* night stars */
    .night {
        background: radial-gradient(circle at 20% 20%, white 1px, transparent 2px),
                    radial-gradient(circle at 70% 40%, white 1px, transparent 2px),
                    radial-gradient(circle at 50% 80%, white 1px, transparent 2px),
                    linear-gradient(#050814, #000);
        background-size: 200px 200px;
        animation: stars 6s ease-in-out infinite alternate;
    }

    @keyframes stars {
        from { filter: brightness(0.8); }
        to { filter: brightness(1.2); }
    }

    /* sunny */
    .sunny {
        background: linear-gradient(to top, #ffb347, #ffcc33);
    }

    /* ===== CARD ===== */
    .card {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        backdrop-filter: blur(12px);
        background: rgba(0,0,0,0.25);
        padding: 30px 40px;
        border-radius: 20px;
        text-align: center;
        min-width: 260px;
    }

    .temp {
        font-size: 64px;
        font-weight: bold;
        margin: 10px 0;
    }

    .icon {
        font-size: 48px;
    }

    /* ===== CONTROLS ===== */
    .controls {
        position: fixed;
        bottom: 20px;
        left: 20px;
        display: flex;
        gap: 30px;
    }

    .panel {
        background: rgba(0,0,0,0.4);
        padding: 10px;
        border-radius: 10px;
    }

    label {
        display: block;
        font-size: 13px;
        margin: 4px 0;
        cursor: pointer;
    }
</style>
</head>

<body>

<div id="bg" class="bg sunny"></div>
<div id="overlay" class="animated-overlay"></div>

<div class="card">
    <div class="icon" id="icon">☀️</div>
    <div class="temp" id="temp">24°</div>
    <div id="desc">Sunny</div>
</div>

<div class="controls">
    <div class="panel">
        <strong>Time</strong>
        <label><input type="radio" name="time" value="sunny" checked> Day</label>
        <label><input type="radio" name="time" value="night"> Night</label>
    </div>

    <div class="panel">
        <strong>Condition</strong>
        <label><input type="radio" name="cond" value="sunny" checked> Sunny</label>
        <label><input type="radio" name="cond" value="rain"> Rain</label>
        <label><input type="radio" name="cond" value="clouds"> Clouds</label>
    </div>
</div>

<script>
const bg = document.getElementById("bg");
const overlay = document.getElementById("overlay");
const icon = document.getElementById("icon");
const desc = document.getElementById("desc");
const temp = document.getElementById("temp");

function update() {
    const time = document.querySelector('input[name="time"]:checked').value;
    const cond = document.querySelector('input[name="cond"]:checked').value;

    overlay.className = "animated-overlay";

    // reset overlay
    overlay.innerHTML = "";

    // time background base
    if (time === "night") {
        bg.className = "bg night";
    } else {
        bg.className = "bg sunny";
    }

    // condition overlay + icon
    if (cond === "rain") {
        overlay.classList.add("rain");
        icon.textContent = "🌧️";
        desc.textContent = "Rainy";
        temp.textContent = "19°";
    }

    if (cond === "clouds") {
        overlay.classList.add("clouds");
        icon.textContent = "☁️";
        desc.textContent = "Cloudy";
        temp.textContent = "21°";
    }

    if (cond === "sunny") {
        icon.textContent = "☀️";
        desc.textContent = "Sunny";
        temp.textContent = time === "night" ? "18°" : "24°";
    }
}

document.querySelectorAll("input").forEach(i => {
    i.addEventListener("change", update);
});

update();
</script>

</body>
</html>
